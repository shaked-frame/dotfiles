# Load a personal reset file only if it exists.
if-shell '[ -f "$HOME/.config/tmux/tmux.reset.conf" ]' 'source-file "$HOME/.config/tmux/tmux.reset.conf"'

# Tell tmux to use a 256-color terminal profile.
set -g default-terminal 'screen-256color'
# Enable truecolor (RGB) support for compatible terminals.
set -as terminal-overrides ',xterm-256color:RGB'

# Use Ctrl-a as tmux prefix key.
set -g prefix C-a
# Remove default Ctrl-b prefix binding.
unbind C-b
# Allow sending a literal Ctrl-a to applications (prefix + Ctrl-a).
bind C-a send-prefix

# Free prefix+Space for tmux-which-key menu (default tmux uses it for next-layout).
unbind Space
# Keep a layout-cycle binding on prefix+=.
bind = next-layout

# Start window numbering at 1 instead of 0.
set -g base-index 1
# Do not close tmux client when a session is destroyed.
set -g detach-on-destroy off
# Remove key-sequence delay for snappier keybindings.
set -g escape-time 0
# Keep a large scrollback buffer per pane.
set -g history-limit 1000000
# Renumber windows automatically after closing one.
set -g renumber-windows on
# Keep manual window names; do not auto-rename from running commands.
set -g automatic-rename off
# Ignore terminal title escape sequences that try to rename windows.
set -g allow-rename off
# Integrate tmux copy with system clipboard.
set -g set-clipboard on
# Enable mouse support for scrolling/selecting panes.
set -g mouse on
# Place tmux status bar at the top.
set -g status-position top
# Use vi keybindings in copy/scroll mode.
setw -g mode-keys vi

# Vim-style pane navigation with prefix + h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style window navigation with prefix + H/L.
bind -r H previous-window
bind -r L next-window

# Vim-style pane resizing with prefix + Ctrl-h/j/k/l.
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Direct pane navigation for Meh+hjkl setups (Ctrl+Alt+Shift+hjkl).
# Depending on terminal/keyboard, either lowercase or uppercase mapping may fire.
bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R
bind -nr C-M-H resize-pane -L 5
bind -nr C-M-J resize-pane -D 5
bind -nr C-M-K resize-pane -U 5
bind -nr C-M-L resize-pane -R 5

# Direct window navigation with Meh + Left/Right arrows.
bind -n C-M-Left previous-window
bind -n C-M-Right next-window

# Remove default left status text (session name like "shakehag").
set -g status-left ''
# Remove default right status text (hostname/computer name).
set -g status-right ''

# Kill pane without confirmation prompt.
bind-key x kill-pane

# Prevent accidental window switching when scrolling on status line.
unbind -T root WheelUpStatus
unbind -T root WheelDownStatus

# Open sesh session picker popup and connect to selected session.
bind-key T display-popup -E -w 80% -h 70% -d '#{pane_current_path}' "sesh connect \"$(sesh list --icons | fzf --no-sort --ansi --reverse --border --prompt 'sesh> ' --preview 'sesh preview {}')\""
# Open sesh window picker popup for current session windows.
bind-key W display-popup -E -w 70% -h 60% -d '#{pane_current_path}' "sesh window \"$(sesh window | fzf --no-sort --ansi --reverse --border --prompt 'window> ')\""
# Open a tree picker for sessions/windows/panes.
bind-key P choose-tree -Zw
# Open tmux paste-buffer picker.
bind-key b choose-buffer
# Switch to previously used session using sesh logic.
bind -N "last-session (via sesh)" B run-shell "sesh last"
# Jump to root project session for current pane directory.
bind -N "switch to root session (via sesh)" 9 run-shell "sesh connect --root #{pane_current_path}"

# If Meh is mapped to F18 via Karabiner/QMK, uncomment this as second prefix.
# set -g prefix2 F18
# bind F18 send-prefix

# TPM: tmux plugin manager (required to install/load plugins below).
set -g @plugin 'tmux-plugins/tpm'
# Sensible defaults plugin.
set -g @plugin 'tmux-plugins/tmux-sensible'
# Better copy/yank integration plugin.
set -g @plugin 'tmux-plugins/tmux-yank'
# Save/restore tmux sessions plugin.
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Automatic periodic save/restore plugin.
set -g @plugin 'tmux-plugins/tmux-continuum'
# Fuzzy finder workflow inside tmux plugin.
set -g @plugin 'sainnhe/tmux-fzf'
# Detect/open URLs via fzf plugin.
set -g @plugin 'wfxr/tmux-fzf-url'
# Catppuccin theme/statusline plugin.
set -g @plugin 'catppuccin/tmux'
# Which-key style popup menu for tmux keybindings.
set -g @plugin 'alexwforsythe/tmux-which-key'

# Restore last saved tmux environment on startup.
set -g @continuum-restore 'on'
# Restore Neovim sessions through resurrect strategy.
set -g @resurrect-strategy-nvim 'session'

# Catppuccin flavor and built-in rounded window style.
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Catppuccin window segment left separator glyph.
set -g @catppuccin_window_left_separator ''
# Catppuccin window segment right separator glyph.
set -g @catppuccin_window_right_separator ''
# Catppuccin separator between window elements.
set -g @catppuccin_window_middle_separator ''
# Place window number on the right side.
set -g @catppuccin_window_number_position 'right'
# Fill inactive window style by number block.
set -g @catppuccin_window_default_fill 'number'
# Show window name text for inactive windows.
set -g @catppuccin_window_text '#W'
# Fill active window style by number block.
set -g @catppuccin_window_current_fill 'number'
# Show active window name and zoom icon when zoomed.
set -g @catppuccin_window_current_text '#W#{?window_zoomed_flag,(),}'
# Right status modules: show only current directory.
set -g @catppuccin_status_modules_right 'directory'
# Left status modules: empty to hide session label.
set -g @catppuccin_status_modules_left ''
# Left status separator style.
set -g @catppuccin_status_left_separator ' '
# Right status separator style.
set -g @catppuccin_status_right_separator ' '
# Do not invert right separator colors.
set -g @catppuccin_status_right_separator_inverse 'no'
# Use icon-based status fill style.
set -g @catppuccin_status_fill 'icon'
# Disable connector between status modules.
set -g @catppuccin_status_connect_separator 'no'
# Show basename of current pane path in directory module.
set -g @catppuccin_directory_text '#{b:pane_current_path}'

# Start TPM (loads plugins and enables prefix + I/U actions).
run '~/.tmux/plugins/tpm/tpm'
